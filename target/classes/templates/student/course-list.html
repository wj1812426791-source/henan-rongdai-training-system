<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>课程中心 - 河南融代</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/shared.css}">
</head>
<body>
<div class="sidebar" id="sidebar-container"></div>
<input type="hidden" id="userRole" th:value="${session.user?.role} ?: 'student'">
<div class="main-content">
<div class="container py-5">
    <h3 class="mb-4" th:text="${courseType == 'public' ? '🌍 全员公开课 (不计入考核)' : '🎯 部门必修课 (计入考核)'}"></h3>

    <table class="table table-hover bg-white shadow-sm rounded">
        <thead class="table-light">
            <tr>
                <th>课程名称</th>
                <th>分类</th>
                <th th:text="${courseType == 'dept' ? '截止日期' : '课程学分'}"></th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${courses}">
                <td th:text="${c.courseName ?: c.get('courseName')}" class="fw-bold"></td>
                <td><span class="badge bg-info" th:text="${c.category ?: c.get('category')}"></span></td>

                <td th:if="${courseType == 'dept'}" th:text="${c.deadline ?: c.get('deadline')}" class="text-danger"></td>
                <td th:if="${courseType == 'public'}" th:text="${c.credit ?: c.get('credit')}"></td>

                <td>
                    <a th:href="@{/student/play(courseId=${c.courseId ?: c.get('courseId')}, type=${courseType})}"
                       class="btn btn-primary btn-sm">去学习</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</div>

<script th:src="@{/js/shared-sidebar.js}"></script>
</body>
</html>
