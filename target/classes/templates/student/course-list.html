<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>课程中心 - 河南融代</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #2c3e50; padding-top: 20px; }
        .sidebar a { display: block; padding: 12px 20px; color: #ecf0f1; text-decoration: none; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; color: #3498db; }
        .sidebar h4 { color: #ecf0f1; text-align: center; margin-bottom: 20px; padding: 0 20px; }
        .main-content { margin-left: 220px; padding: 20px; }
        .course-card { transition: transform 0.2s; border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .course-card:hover { transform: translateY(-5px); }
        .video-thumb { 
            height: 160px; 
            background: #2c3e50; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white;
            border-radius: 10px 10px 0 0;
        }
        .category-badge { position: absolute; top: 10px; right: 10px; }
    </style>
</head>
<body>
<div class="sidebar"></div>
<script>var currentUserRole = 'student';</script>
<div class="main-content">


<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📚 我的课程中心</h2>
        <a href="/student/ranking" class="btn btn-outline-primary">查看荣誉榜</a>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
    <div class="col" th:each="course : ${courses}">
        <div class="card h-100 course-card" th:classappend="${course.get('isFinished') == 1 ? 'border-success' : ''}">
            
            <div class="video-thumb">
                <span style="font-size: 3rem;">▶️</span>
                <span class="badge bg-primary category-badge" th:text="${course.get('category')}">分类</span>
                
                <span th:if="${course.get('isFinished') == 1}" 
                      class="badge bg-success position-absolute" style="top:10px; left:10px;">✅ 已完成</span>
                <span th:unless="${course.get('isFinished') == 1}" 
                      class="badge bg-secondary position-absolute" style="top:10px; left:10px;">⏳ 未学习</span>
            </div>

            <div class="card-body">
                <h5 class="card-title" th:text="${course.get('courseName')}">课程名称</h5>
                <p class="text-muted small">学分奖励：<span th:text="${course.get('credit')}">5</span> 分</p>
                
                <a th:href="@{'/student/play/' + ${course.get('courseId')}}" 
                   class="btn w-100" 
                   th:classappend="${course.get('isFinished') == 1 ? 'btn-outline-success' : 'btn-primary'}"
                   th:text="${course.get('isFinished') == 1 ? '再次复习' : '开始学习'}">
                   开始学习
                </a>
            </div>
        </div>
    </div>
</div>
</div>

<script th:src="@{/js/shared-sidebar.js}"></script>
<script th:src="@{/js/course-list.js}"></script>
</body>
</html>
