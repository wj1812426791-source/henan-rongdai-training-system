<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>课程中心 - 河南融代</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .course-card { transition: transform 0.2s; border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .course-card:hover { transform: translateY(-5px); }
        .video-thumb { 
            height: 160px; 
            background: #2c3e50; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white;
            border-radius: 10px 10px 0 0;
        }
        .category-badge { position: absolute; top: 10px; right: 10px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📚 我的课程中心</h2>
        <a href="/student/ranking" class="btn btn-outline-primary">查看荣誉榜</a>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="course : ${courses}">
            <div class="card h-100 course-card">
                <div class="video-thumb">
                    <span style="font-size: 3rem;">▶️</span>
                    <span class="badge bg-primary category-badge" th:text="${course.category}">分类</span>
                </div>
                <div class="card-body">
                    <h5 class="card-title" th:text="${course.courseName}">课程名称</h5>
                    <p class="text-muted small">学分奖励：<span th:text="${course.credit}">5</span> 分</p>
                    <a th:href="@{'/student/play/' + ${course.courseId}}" class="btn btn-success w-100">开始学习</a>
                </div>
            </div>
        </div>
        
        <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(courses)}">
            <p class="text-muted">暂无可选课程，请联系管理员审核上传。</p>
        </div>
    </div>
</div>
<script th:src="@{/js/course-list.js}"></script>
</body>
</html>
