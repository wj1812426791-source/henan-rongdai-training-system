<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>上传课程 - 河南融代</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #2c3e50; padding-top: 20px; }
        .sidebar a { display: block; padding: 12px 20px; color: #ecf0f1; text-decoration: none; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; color: #3498db; }
        .sidebar h4 { color: #ecf0f1; text-align: center; margin-bottom: 20px; padding: 0 20px; }
        .main-content { margin-left: 220px; padding: 20px; }
    </style>
</head>
<body>
<div class="sidebar"></div>
<input type="hidden" id="userRole" th:value="${session.user?.role} ?: 'student'">
<div class="main-content">
<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 600px;">
        <div class="card-header bg-dark text-white"><h5 th:text="${isEdit ? '重新上传课程' : '发布新培训课程'}">发布新培训课程</h5></div>
        <div class="card-body">
            <div th:if="${isEdit}" class="alert alert-info">
                您正在重新编辑审核未通过的课程，提交后将重新进入审核流程。
            </div>
            <form id="uploadForm" action="/teacher/doUpload" method="post" enctype="multipart/form-data">
                <input type="hidden" name="courseId" th:value="${course.courseId}">
                <div class="mb-3">
                    <label class="form-label">课程标题</label>
                    <input type="text" name="courseName" class="form-control" th:value="${course.courseName}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">所属分类</label>
                    <select name="category" class="form-control">
                        <option value="业务常识" th:selected="${course.category == '业务常识'}">业务常识</option>
                        <option value="安全合规" th:selected="${course.category == '安全合规'}">安全合规</option>
                        <option value="技术培训" th:selected="${course.category == '技术培训'}">技术培训</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">奖励学分</label>
                    <input type="number" name="credit" class="form-control" th:value="${course.credit} ?: 5">
                </div>
                <div class="mb-3">
                    <label class="form-label">选择 MP4 视频</label>
                    <input type="file" name="videoFile" id="videoFile" class="form-control" accept="video/mp4" th:required="${!isEdit}">
                    <div id="fileHelp" class="form-text">仅支持 MP4 格式，文件大小不超过 100MB。</div>
                </div>

                <div class="progress mb-3 d-none" id="progressContainer">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100" th:text="${isEdit ? '保存并重新提交' : '开始上传'}">开始上传</button>
            </form>
        </div>
    </div>
</div>
</div>

<script th:src="@{/js/shared-sidebar.js}"></script>
<script th:src="@{/js/upload-logic.js}"></script>
</body>
</html>
