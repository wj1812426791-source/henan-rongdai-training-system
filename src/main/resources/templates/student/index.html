<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学员个人中心</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .sidebar { position: fixed; left: 0; top: 0; width: 240px; height: 100vh; background: #2c3e50; color: white; padding-top: 20px; }
        .main-content { margin-left: 240px; padding: 40px; }
        
        /* 状态大卡片 */
        .status-card {
            border-radius: 20px;
            border: none;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .status-header {
            padding: 40px;
            text-align: center;
            color: white;
        }
        
        /* 通过状态的颜色 */
        .bg-passed { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        /* 未通过状态的颜色 */
        .bg-pending { background: linear-gradient(135deg, #f1c40f, #f39c12); }
        
        .status-icon { font-size: 4rem; margin-bottom: 15px; }
        
        .info-group {
            display: flex;
            justify-content: space-around;
            padding: 30px;
            background: #fff;
        }
        
        .info-item { text-align: center; }
        .info-value { font-size: 1.8rem; font-weight: bold; display: block; color: #2c3e50; }
        .info-label { color: #7f8c8d; font-size: 0.9rem; }

        .btn-action {
            border-radius: 12px;
            padding: 12px 30px;
            font-weight: bold;
            transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="text-center">培训系统</h4>
    </div>

<div class="main-content">
    <div class="container">
        <h2 class="mb-4">你好，<span th:text="${session.user?.realName}">学员</span> 👋</h2>

        <div class="card status-card">
            
            <div th:if="${currentCredit >= standard}" class="status-header bg-passed">
                <div class="status-icon">🎉</div>
                <h2 class="fw-bold">恭喜！您已通过本次培训</h2>
                <p class="opacity-75">您的表现非常出色，所有考核指标均已达标。</p>
            </div>

            <div th:unless="${currentCredit >= standard}" class="status-header bg-pending">
                <div class="status-icon">📺</div>
                <h2 class="fw-bold">学习进行中</h2>
                <p class="opacity-75">目前尚未达到结业标准，请尽快完成视频观看。</p>
            </div>

            <div class="info-group border-bottom">
                <div class="info-item">
                    <span class="info-value" th:text="${currentCredit}">0</span>
                    <span class="info-label">当前累计学分</span>
                </div>
                <div class="info-item border-start border-end px-5">
                    <span class="info-value" th:text="${standard}">100</span>
                    <span class="info-label">培训达标要求</span>
                </div>
                <div class="info-item">
                    <span class="info-value">[[${currentCredit >= standard ? '100%' : (currentCredit * 100 / standard) + '%'}]]</span>
                    <span class="info-label">完成进度</span>
                </div>
            </div>

            <div class="p-4 text-center">
                <a th:href="@{/student/courses}" class="btn btn-primary btn-action shadow-sm" th:if="${currentCredit < standard}">
                    继续观看视频
                </a>
                <a th:href="@{/student/certificate}" class="btn btn-success btn-action shadow-sm" th:if="${currentCredit >= standard}">
                    查看结业证书
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
