<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${course.courseName} + ' - 课程播放'">课程播放</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #2c3e50; color: white; font-family: "Microsoft YaHei", sans-serif; }
        .video-container { max-width: 800px; margin: 40px auto; background: #1a252f; padding: 20px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { border-radius: 8px; width: 100%; outline: none; background-color: #000; }
        .course-info { margin-top: 20px; }
        .credit-tag { background: #e74c3c; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container video-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 th:text="${course.courseName}">课程名称</h3>
        <a href="/student/courses" class="btn btn-outline-light btn-sm">返回课程列表</a>
    </div>

    <video id="courseVideo" controls controlsList="nodownload">
        <source th:src="@{'/' + ${course.videoPath}}" type="video/mp4">
        您的浏览器不支持 HTML5 视频。
    </video>

    <div class="course-info d-flex justify-content-between align-items-center">
        <div>
            <span class="badge bg-info" th:text="${course.category}">分类</span>
        </div>
        <span class="credit-tag">学分奖励: <span th:text="${course.credit}"></span> 分</span>
    </div>
</div>

<input type="hidden" id="hiddenCourseId" th:value="${course.courseId}">
<input type="hidden" id="hiddenUserId" th:value="${currentUserId}">

<script th:src="@{/js/video-tracker.js}"></script>

</body>
</html>
