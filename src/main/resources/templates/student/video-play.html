<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>正在学习 - [[${course.courseName}]]</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/shared.css}">
    <style>
        body { background-color: #2c3e50; color: white; font-family: "Microsoft YaHei", sans-serif; }
        .video-container { max-width: 900px; margin: 40px auto; background: #1a252f; padding: 20px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { border-radius: 8px; width: 100%; outline: none; background-color: #000; }
        .course-info { margin-top: 20px; }
        .credit-tag { background: #e74c3c; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>
<div class="sidebar" id="sidebar-container"></div>
<input type="hidden" id="userRole" th:value="${session.user?.role} ?: 'student'">
<div class="main-content">
    <div class="container video-container">
        <div class="card bg-dark text-white">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">正在学习：[[${course.courseName}]]</h5>
                <span class="badge" th:classappend="${courseType == 'dept' ? 'bg-danger' : 'bg-info'}"
                      th:text="${courseType == 'dept' ? '部门必修' : '全员公开'}"></span>
            </div>
            <div class="card-body text-center p-0 bg-black">
                <video id="myVideo" controls width="100%" height="500">
                    <source th:src="@{'/uploads/' + ${course.videoPath}}" type="video/mp4">
                    您的浏览器不支持视频播放。
                </video>
            </div>
            <div class="card-footer d-flex justify-content-between">
                <a th:href="${courseType == 'dept' ? '/student/dept-courses' : '/student/public-courses'}"
                   class="btn btn-secondary">返回列表</a>
                <button id="finishBtn" class="btn btn-success" disabled>完成学习</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/shared-sidebar.js}"></script>
<script>
    const video = document.getElementById('myVideo');
    const btn = document.getElementById('finishBtn');

    video.onended = function() {
        btn.disabled = false;
        btn.innerText = "点击提交进度";
    };

    btn.onclick = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('courseId');
        const type = urlParams.get('type');

        fetch('/student/submit-progress?courseId=' + courseId + '&type=' + type, { method: 'POST' })
        .then(res => res.text())
        .then(data => {
            alert("学习进度已保存！" + (type === 'dept' ? "学分已增加。" : "公开课不计学分。"));
            window.location.href = (type === 'dept' ? "/student/dept-courses" : "/student/public-courses");
        });
    };
</script>
</body>
</html>
