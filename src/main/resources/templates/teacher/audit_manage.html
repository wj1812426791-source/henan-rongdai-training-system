<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学员培训审核</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #2c3e50; padding-top: 20px; z-index: 100; }
        .sidebar a { display: block; padding: 12px 20px; color: #ecf0f1; text-decoration: none; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; color: #3498db; }
        .sidebar h4 { color: #ecf0f1; text-align: center; margin-bottom: 20px; padding: 0 20px; }
        .main-content { margin-left: 220px; padding: 20px; }
        
        /* 方圆框卡片设计 */
        .audit-card {
            border-radius: 15px;
            border: none;
            transition: 0.3s;
            background: #ffffff;
        }
        .audit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important;
        }
        .setting-card {
            border-radius: 15px;
            border-left: 5px solid #0d6efd;
        }
        .credit-display {
            font-size: 1.5rem;
            font-weight: bold;
            color: #198754;
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar-container"></div>
<input type="hidden" id="userRole" th:value="${session.user?.role} ?: 'teacher'">
<input type="hidden" id="standardData" th:value="${standard ?: 100}">

<div class="main-content">
    <div class="container-fluid">
        <h3 class="mb-4 text-dark">🎓 学员培训达标审核</h3>

        <div class="card setting-card shadow-sm mb-4">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="me-auto">
                    <span class="fw-bold d-block">🚩 达标学分线设置</span>
                    <small class="text-muted">当前系统展示累计学分满 <span class="text-primary fw-bold" th:text="${standard}"></span> 分的学员</small>
                </div>
                <input type="number" id="creditInput" class="form-control" style="width: 110px;" placeholder="分值">
                <button class="btn btn-primary px-4" onclick="updateStandard()">保存并筛选</button>
            </div>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <div class="col" th:each="u : ${qualifiedStudents}">
                <div class="card h-100 shadow-sm audit-card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title fw-bold" th:text="${u['realName']}">学员姓名</h5>
                            <span class="badge bg-success bg-opacity-10 text-success">已达标</span>
                        </div>
                        <p class="text-muted small mb-3">
                            <i class="bi bi-building"></i> 部门：<span th:text="${u['deptName']}">部门名称</span>
                        </p>
                        <div class="d-flex justify-content-between align-items-center bg-light p-3 rounded-3">
                            <span class="small text-secondary">累计获得学分</span>
                            <span class="credit-display">[[${u['currentCredit']}]]</span>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent border-0 pb-3 px-3">
                        <button class="btn btn-outline-primary w-100 rounded-pill fw-bold"
                                th:attr="data-uid=${u['userId']}, data-credit=${u['currentCredit']}"
                                onclick="approve(this)">
                            确认审核通过
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(qualifiedStudents)}" class="text-center mt-5 py-5">
            <p class="text-muted fs-5">暂无达到当前标准的学员记录</p>
            <button class="btn btn-link" onclick="document.getElementById('creditInput').focus()">尝试调整分值</button>
        </div>
    </div>
</div>

<script th:src="@{/js/shared-sidebar.js}"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    // 页面初始化
    $(document).ready(function() {
        // 从隐藏域读取后端传来的标准
        const backendStd = document.getElementById('standardData').value;
        // 优先尝试从浏览器本地存储读取
        const localStd = localStorage.getItem('training_std');
        
        // 设置输入框的初始值
        document.getElementById('creditInput').value = localStd || backendStd;
    });

    // 筛选按钮逻辑
    function updateStandard() {
        const val = document.getElementById('creditInput').value;
        if (!val || val <= 0) {
            alert("请输入正确的学分分值");
            return;
        }
        // 保存到本地，下次进入页面还会记得
        localStorage.setItem('training_std', val);
        // 跳转回 Controller 重新查数据库
        window.location.href = '/teacher/audit?standard=' + val;
    }

    // 审核接口调用
    function approve(btn) {
        const uid = btn.getAttribute('data-uid');
        const credit = btn.getAttribute('data-credit');
        
        if (confirm('是否确认该学员培训合格？\n通过后该记录将进入正式结业名单。')) {
            $.post('/teacher/audit/approve', { 
                userId: uid, 
                credit: credit 
            }, function(res) {
                if (res.success) {
                    alert('审核成功！数据已更新。');
                    location.reload();
                } else {
                    alert('审核失败，请检查网络或联系管理员。');
                }
            });
        }
    }
</script>
</body>
</html>
