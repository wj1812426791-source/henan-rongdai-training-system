<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学员培训审核</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/shared.css}">
    <style>
        .audit-card { transition: 0.3s; }
        .audit-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar-container"></div>
<input type="hidden" id="userRole" th:value="${session.user?.role} ?: 'teacher'">

<div class="main-content">
    <div class="container-fluid">
        <h3 class="mb-4">🎓 学员培训达标审核</h3>

        <div class="card p-3 mb-4 border-start border-primary border-5">
            <div class="d-flex align-items-center gap-3">
                <span class="fw-bold">🚩 结业学分线：</span>
                <input type="number" id="creditInput" class="form-control" style="width: 120px;">
                <button class="btn btn-primary px-4" onclick="updateStandard()">保存并更新列表</button>
                <span class="text-muted small">当前正在审核累计满 <b class="text-primary" id="currentStdDisplay">[[${standard}]]</b> 分的学员</span>
            </div>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <div class="col" th:each="u : ${qualifiedStudents}">
                <div class="card h-100 audit-card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-2">
                            <h5 class="fw-bold mb-0" th:text="${u['realName']}">姓名</h5>
                            <span class="badge bg-success bg-opacity-10 text-success">已达标</span>
                        </div>
                        <p class="text-muted small mb-3">部门：<span th:text="${u['deptName']}">部门名称</span></p>
                        <div class="bg-light p-3 rounded-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="small text-secondary">累计学分</span>
                                <span class="h5 text-success mb-0" th:text="${u['currentCredit']}">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent border-0 pb-3">
                        <button class="btn btn-outline-success w-100 rounded-pill"
                                th:attr="data-uid=${u['userId']}, data-credit=${u['currentCredit']}"
                                onclick="approve(this)">
                            确认审核通过
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(qualifiedStudents)}" class="text-center mt-5 py-5">
            <p class="text-muted fs-5">暂无达到当前标准的学员记录</p>
        </div>
    </div>
</div>

<script th:src="@{/js/shared-sidebar.js}"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    (function() {
        const params = new URLSearchParams(window.location.search);
        const currentStdInUrl = params.get('standard');
        const savedStd = localStorage.getItem('training_std') || 100;

        if (currentStdInUrl === null) {
            window.location.href = window.location.pathname + '?standard=' + savedStd;
            return;
        } else if (currentStdInUrl !== savedStd) {
            localStorage.setItem('training_std', currentStdInUrl);
        }

        $(document).ready(function() {
            $('#creditInput').val(currentStdInUrl || savedStd);
        });
    })();

    function updateStandard() {
        const val = $('#creditInput').val();
        if (val && val > 0) {
            localStorage.setItem('training_std', val);
            window.location.href = '/teacher/audit?standard=' + val;
        } else {
            alert("请输入正确的学分分值");
        }
    }

    function approve(btn) {
        const uid = btn.getAttribute('data-uid');
        const credit = btn.getAttribute('data-credit');
        if (confirm('是否确认该学员培训合格？')) {
            $.post('/teacher/audit/approve', {
                userId: uid,
                credit: credit
            }, function(res) {
                if (res.success) {
                    alert('审核成功！');
                    location.reload();
                }
            });
        }
    }
</script>
</body>
</html>
