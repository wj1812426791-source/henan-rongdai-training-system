<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学员培训审核</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/shared.css}">
</head>
<body>

<div class="sidebar" id="sidebar-container"></div>
<input type="hidden" id="userRole" th:value="${session.user?.role} ?: 'teacher'">

<div class="main-content">
    <div class="container-fluid">
        <h3 class="mb-4">🎓 学员培训达标审核</h3>

        <div class="card p-3 mb-4 border-start border-primary border-5">
            <div class="d-flex align-items-center gap-3">
                <span class="fw-bold">🚩 结业学分线：</span>
                <input type="number" id="creditInput" class="form-control" style="width: 120px;">
                <button class="btn btn-primary px-4" onclick="updateStandard()">保存并更新列表</button>
                <span class="text-muted small">当前正在审核累计满 <b class="text-primary" id="currentStdDisplay">[[${standard}]]</b> 分的学员</span>
            </div>
        </div>

        <div class="card shadow-sm border-0" style="border-radius: 15px;">
            <div class="card-body p-4">
                <table class="table align-middle mb-0">
                    <thead>
                        <tr>
                            <th>学员姓名</th>
                            <th>部门</th>
                            <th>累计学分</th>
                            <th>考试状态/分数</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${qualifiedStudents}">
                            <td class="fw-bold" th:text="${s['realName']}">演示学员</td>
                            <td class="text-muted" th:text="${s['deptName']}">技术部</td>
                            <td><span class="badge bg-success" th:text="${s['currentCredit']}">105</span></td>
                            <td>
                                <span th:if="${s['status'] == 1}">
                                    <span class="badge bg-success"><i class="bi bi-check-circle"></i> 已结业</span>
                                </span>
                                <span th:if="${s['status'] == 0 or s['status'] == null}">
                                    <span th:if="${s['examStatus'] == null or s['examStatus'] == 0}" class="text-muted small">未开启考核</span>
                                    <span th:if="${s['examStatus'] == 1}" class="text-warning small">考核中...</span>
                                    <span th:if="${s['examStatus'] == 2}">
                                        得分：<b class="exam-score-val text-danger" th:text="${s['examScore']}">0</b> 分
                                    </span>
                                </span>
                            </td>
                            <td>
                                <div th:if="${s['status'] == 1}">
                                    <span class="text-muted small">已完成培训</span>
                                </div>

                                <div th:if="${s['status'] == 0 or s['status'] == null}">
                                    <div th:if="${s['examStatus'] == 2}">
                                        <button th:if="${s['examScore'] >= 60}" class="btn btn-sm btn-success rounded-pill"
                                                th:attr="data-uid=${s['userId']}, data-credit=${s['currentCredit']}"
                                                onclick="approveStudent(this)">审核通过</button>
                                        <span th:if="${s['examScore'] < 60}" class="badge bg-danger me-2">成绩不及格</span>
                                        <button class="btn btn-sm btn-outline-danger rounded-pill"
                                                th:attr="data-uid=${s['userId']}"
                                                onclick="reSendExam(this)">重新下发</button>
                                    </div>

                                    <span th:if="${s['examStatus'] == 1}" class="text-warning small">学员正在考试...</span>

                                    <div th:if="${s['examStatus'] == 0 or s['examStatus'] == null}" class="input-group input-group-sm" style="width: 220px;">
                                        <select class="form-select" th:id="'examSel_' + ${s['userId']}">
                                            <option value="">请选择试卷</option>
                                            <option th:each="e : ${exams}" th:value="${e['examId']}" th:text="${e['title']}"></option>
                                        </select>
                                        <button class="btn btn-primary" th:attr="data-uid=${s['userId']}" onclick="sendExam(this)">下发</button>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(qualifiedStudents)}">
                            <td colspan="5" class="text-center py-5 text-muted">暂无达到当前标准的学员记录</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/shared-sidebar.js}"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    (function() {
        const params = new URLSearchParams(window.location.search);
        const currentStdInUrl = params.get('standard');
        const savedStd = localStorage.getItem('training_std') || 100;

        if (currentStdInUrl === null) {
            window.location.href = window.location.pathname + '?standard=' + savedStd;
            return;
        } else if (currentStdInUrl !== savedStd) {
            localStorage.setItem('training_std', currentStdInUrl);
        }

        $(document).ready(function() {
            $('#creditInput').val(currentStdInUrl || savedStd);
        });
    })();

    function updateStandard() {
        const val = $('#creditInput').val();
        if (val && val > 0) {
            localStorage.setItem('training_std', val);
            window.location.href = '/teacher/audit?standard=' + val;
        } else {
            alert("请输入正确的学分分值");
        }
    }

    function sendExam(btn) {
        const userId = btn.getAttribute('data-uid');
        const examId = $('#examSel_' + userId).val();
        if (!examId) {
            alert('请先选择一套试卷！');
            return;
        }
        $.post('/teacher/assignExam', { userId: userId, examId: examId }, function(res) {
            if (res.success) {
                alert('试卷已送达学员个人中心！');
                location.reload();
            } else {
                alert('下发失败：' + res.message);
            }
        });
    }

    function reSendExam(btn) {
        const userId = btn.getAttribute('data-uid');
        if (confirm('重新下发将清空之前的成绩，确定吗？')) {
            $.post('/teacher/resetExam', { userId: userId }, function(res) {
                if (res.success) {
                    location.reload();
                }
            });
        }
    }

    function approveStudent(btn) {
        const userId = btn.getAttribute('data-uid');
        const credit = btn.getAttribute('data-credit');
        if (confirm('是否确认该学员培训合格？')) {
            $.post('/teacher/audit/approve', {
                userId: userId,
                credit: credit
            }, function(res) {
                if (res.success) {
                    alert('审核成功！');
                    location.reload();
                }
            });
        }
    }
</script>
</body>
</html>
