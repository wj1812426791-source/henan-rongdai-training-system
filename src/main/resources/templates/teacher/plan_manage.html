<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>下发计划 - 教师端</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #2c3e50; padding-top: 20px; }
        .sidebar a { display: block; padding: 12px 20px; color: #ecf0f1; text-decoration: none; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; color: #3498db; }
        .sidebar h4 { color: #ecf0f1; text-align: center; margin-bottom: 20px; padding: 0 20px; }
        .main-content { margin-left: 220px; padding: 20px; }
    </style>
</head>
<body>
<div class="sidebar"></div>
<input type="hidden" id="userRole" th:value="${session.user?.role} ?: 'teacher'">
<div class="main-content">
<div class="container py-5">
    <h3 class="mb-4">📅 学习计划下发</h3>

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">发布新任务</div>
        <div class="card-body">
            <form id="planForm" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">选择课程 (已上架)</label>
                    <select id="courseId" class="form-select" required>
                        <option value="">-- 请选择课程 --</option>
                        <option th:each="c : ${publishedCourses}"
                                th:value="${c.courseId}"
                                th:text="${c.courseName}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">接收部门</label>
                    <select id="deptId" class="form-select" required>
                        <option th:each="d : ${departments}"
                                th:value="${d.deptId}"
                                th:text="${d.deptName}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">截止日期</label>
                    <input type="date" id="deadline" class="form-control" required>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="button" onclick="submitPlan()" class="btn btn-success w-100">确认下发</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-secondary text-white">已发布的计划记录</div>
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>课程名称</th>
                    <th>目标部门</th>
                    <th>截止日期</th>
                    <th>发布时间</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${plans}">
                    <td th:text="${p.courseName}"></td>
                    <td><span class="badge bg-info" th:text="${p.deptName}"></span></td>
                    <td th:text="${p.deadline}" class="text-danger"></td>
                    <td th:text="${p.createTime}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</div>

<script th:src="@{/js/shared-sidebar.js}"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
function submitPlan() {
    const data = {
        courseId: $('#courseId').val(),
        deptId: $('#deptId').val(),
        deadline: $('#deadline').val()
    };

    if (!data.courseId || !data.deadline) {
        alert("请填写完整信息");
        return;
    }

    $.post('/teacher/dispatch', data, function(res) {
        if (res.success) {
            alert('学习计划已同步至学员端！');
            location.reload();
        } else {
            alert(res.msg);
        }
    });
}
</script>
</body>
</html>
