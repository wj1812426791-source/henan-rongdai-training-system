<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>课程管理 - 教师端</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🛠️ 课程内容管理</h2>
        <a href="/teacher/upload" class="btn btn-primary">+ 发布新课程</a>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>课程名称</th>
                        <th>分类</th>
                        <th>学分</th>
                        <th>视频文件</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${courses}">
                        <td th:text="${c.courseId}">1</td>
                        <td th:text="${c.courseName}" class="fw-bold">名称</td>
                        <td><span class="badge bg-secondary" th:text="${c.category}">分类</span></td>
                        <td th:text="${c.credit}">5</td>
                        <td class="small text-muted" th:text="${c.videoPath}">file.mp4</td>
                        <td>
                            <button class="btn btn-danger btn-sm" 
                                    th:onclick="'deleteCourse(' + ${c.courseId} + ')'">删除</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script th:src="@{/js/manage-logic.js}"></script>
</body>
</html>
