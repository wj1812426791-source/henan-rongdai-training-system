<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>分类管理 - 教师端</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #2c3e50; padding-top: 20px; }
        .sidebar a { display: block; padding: 12px 20px; color: #ecf0f1; text-decoration: none; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; color: #3498db; }
        .sidebar h4 { color: #ecf0f1; text-align: center; margin-bottom: 20px; padding: 0 20px; }
        .main-content { margin-left: 220px; padding: 20px; }
    </style>
</head>
<body>
<div class="sidebar"></div>
<input type="hidden" id="userRole" th:value="${session.user?.role} ?: 'student'">
<div class="main-content">
    <div class="container py-5">
        <h3 class="mb-4">📁 课程分类管理</h3>

        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">新增分类</div>
            <div class="card-body">
                <form action="/teacher/category/add" method="post" class="row g-3">
                    <div class="col-auto">
                        <input type="text" name="categoryName" class="form-control" placeholder="输入新分类名称" required>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary">确认添加</button>
                    </div>
                </form>
            </div>
        </div>

        <table class="table table-hover bg-white rounded shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>分类名称</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${categories}">
                    <td th:text="${c.categoryId}"></td>
                    <td th:text="${c.categoryName}"></td>
                    <td>
                        <button class="btn btn-warning btn-sm"
                                th:data-id="${c.categoryId}"
                                th:data-name="${c.categoryName}"
                                onclick="openEditModal(this)">编辑</button>
                        <button class="btn btn-danger btn-sm" th:onclick="'deleteCategory(' + ${c.categoryId} + ')'">删除</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="editCatModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑分类名称</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editCatId">
                <input type="text" id="editCatName" class="form-control" placeholder="输入新的分类名称">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="submitEdit()">保存修改</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/shared-sidebar.js}"></script>
<script>
    function openEditModal(btn) {
        const id = btn.getAttribute('data-id');
        const name = btn.getAttribute('data-name');
        document.getElementById('editCatId').value = id;
        document.getElementById('editCatName').value = name;
        new bootstrap.Modal(document.getElementById('editCatModal')).show();
    }

    function submitEdit() {
        const id = document.getElementById('editCatId').value;
        const name = document.getElementById('editCatName').value;

        let formData = new FormData();
        formData.append('categoryId', id);
        formData.append('categoryName', name);

        fetch('/teacher/category/update', {
            method: 'POST',
            body: formData
        }).then(res => {
            if(res.ok) location.reload();
        });
    }

    function deleteCategory(id) {
        if(confirm('删除该分类后，教师上传课程时将不再看到此选项，确定吗？')) {
            fetch('/teacher/category/delete/' + id, { method: 'POST' })
            .then(res => {
                if(res.ok) location.reload();
            });
        }
    }
</script>
</body>
</html>
