<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>课程审核 - 管理端</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .sidebar { width: 250px; height: 100vh; position: fixed; background: #343a40; color: white; padding: 20px; }
        .main-content { margin-left: 260px; padding: 30px; }
    </style>
</head>
<body>
    <div class="sidebar">
        </div>

    <div class="main-content">
        <h3 class="mb-4">🔍 待审核课程列表</h3>
        <div class="card shadow-sm">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-secondary">
                    <tr>
                        <th>课程名称</th>
                        <th>分类</th>
                        <th>上传教师</th>
                        <th>设定的学分</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${pendingList}">
                        <td th:text="${c.courseName}" class="fw-bold"></td>
                        <td><span class="badge bg-info" th:text="${c.category}"></span></td>
                        <td th:text="${c.teacherName}"></td>
                        <td th:text="${c.credit}"></td>
                        <td>
                            <button class="btn btn-success btn-sm me-2" th:onclick="'submitAudit(' + ${c.courseId} + ', 1)'">通过</button>
                            <button class="btn btn-danger btn-sm" th:onclick="'submitAudit(' + ${c.courseId} + ', 2)'">驳回</button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(pendingList)}">
                        <td colspan="5" class="text-center text-muted py-4">暂无待审核课程</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function submitAudit(id, status) {
            const action = status === 1 ? '通过' : '驳回';
            if (!confirm(`确定要${action}该课程的审核吗？`)) return;

            let formData = new FormData();
            formData.append('courseId', id);
            formData.append('status', status);

            fetch('/admin/api/audit', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('操作成功！');
                    location.reload(); // 刷新列表
                }
            });
        }
    </script>
</body>
</html>
