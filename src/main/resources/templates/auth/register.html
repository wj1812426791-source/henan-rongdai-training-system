<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户注册 - 河南融代</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f9; font-family: "Microsoft YaHei", sans-serif; }
        .register-container { max-width: 500px; margin: 80px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-title { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .btn-register { background-color: #3498db; color: white; border: none; padding: 12px; font-size: 1.1rem; }
        .btn-register:hover { background-color: #2980b9; }
    </style>
</head>
<body>
<div class="container">
    <div class="register-container">
        <h2 class="form-title">👨‍🎓 学员注册</h2>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form action="/doRegister" method="post">
            <div class="mb-3">
                <label class="form-label">登录账号</label>
                <input type="text" name="username" class="form-control" placeholder="请输入账号" required>
            </div>

            <div class="mb-3">
                <label class="form-label">真实姓名</label>
                <input type="text" name="realName" class="form-control" placeholder="请输入姓名" required>
            </div>

            <div class="mb-3">
                <label class="form-label">初始密码</label>
                <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
            </div>

            <div class="mb-3">
                <label class="form-label">所属部门</label>
                <select name="deptId" class="form-select">
                    <option value="">请选择部门</option>
                    <option th:each="dept : ${depts}" th:value="${dept.deptId}" th:text="${dept.deptName}"></option>
                </select>
            </div>

            <button type="submit" class="btn btn-register w-100">立即注册</button>
        </form>

        <div class="text-center mt-3">
            <a href="/login">已有账号？立即登录</a>
        </div>
    </div>
</div>
</body>
</html>
