<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户登录 - 河南融代</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f9; font-family: "Microsoft YaHei", sans-serif; }
        .login-container { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-title { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .btn-login { background-color: #3498db; color: white; border: none; padding: 12px; font-size: 1.1rem; }
        .btn-login:hover { background-color: #2980b9; }
    </style>
</head>
<body>
<div class="container">
    <div class="login-container">
        <h2 class="form-title">🏠 河南融代培训系统</h2>

        <div th:if="${param.msg == 'success'}" class="alert alert-success">注册成功，请登录！</div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form action="/doLogin" method="post">
            <div class="mb-3">
                <label class="form-label">账号</label>
                <input type="text" name="username" class="form-control" placeholder="请输入账号" required>
            </div>

            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
            </div>

            <button type="submit" class="btn btn-login w-100">登录</button>
        </form>

        <div class="text-center mt-3">
            <a href="/register">没有账号？立即注册</a>
        </div>
    </div>
</div>
</body>
</html>
