<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">用户管理</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/shared.css}">
</head>
<body>
<div class="sidebar" id="sidebar-container"></div>
<input type="hidden" id="userRole" th:value="${session.user?.role} ?: 'admin'">
<div class="main-content">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="${title}">管理模块</h2>
        <button th:if="${roleType == 'teacher'}" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">+ 手动新增教师</button>
    </div>

    <div class="card shadow">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>登录账号</th>
                    <th>真实姓名</th>
                    <th>登录密码</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.userId}"></td>
                    <td th:text="${u.username}"></td>
                    <td th:text="${u.realName}"></td>
                    <td th:text="${u.password}"></td>
                    <td>
                        <button class="btn btn-warning btn-sm"
                                th:data-id="${u.userId}"
                                th:data-un="${u.username}"
                                th:data-rn="${u.realName}"
                                th:data-pw="${u.password}"
                                onclick="editUser(this)">修改</button>
                        <button class="btn btn-danger btn-sm" th:onclick="'deleteUser(' + ${u.userId} + ')'">注销</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</div>

<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <form action="/admin/user/add" method="post" class="modal-content">
            <div class="modal-header"><h5>新增教师账户</h5></div>
            <div class="modal-body">
                <input type="hidden" name="role" value="teacher">
                <div class="mb-3"><label>登录账号</label><input type="text" name="username" class="form-control" placeholder="如：T001" required></div>
                <div class="mb-3"><label>教师姓名</label><input type="text" name="realName" class="form-control" placeholder="如：李老师" required></div>
                <div class="mb-3"><label>初始密码</label><input type="password" name="password" class="form-control" placeholder="默认 123456"></div>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-success">确认创建</button>
            </div>
        </form>
    </div>
</div>

<div class="modal fade" id="editModal">
    <div class="modal-dialog">
        <form action="/admin/user/update" method="post" class="modal-content">
            <div class="modal-header"><h5>修改用户信息</h5></div>
            <div class="modal-body">
                <input type="hidden" name="userId" id="editUserId">
                <input type="hidden" name="role" value="teacher">
                <div class="mb-3">
                    <label>登录账号</label>
                    <input type="text" name="username" id="editUsername" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>真实姓名</label>
                    <input type="text" name="realName" id="editRealName" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>登录密码</label>
                    <input type="text" name="password" id="editPassword" class="form-control" required>
                </div>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-warning">保存修改</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/shared-sidebar.js}"></script>
<script>
function deleteUser(id) {
    if(confirm('确定要注销此用户吗？此操作不可逆！')) {
        fetch('/admin/user/delete/' + id, { method: 'POST' })
        .then(() => location.reload());
    }
}
function editUser(btn) {
    const id = btn.getAttribute('data-id');
    const un = btn.getAttribute('data-un');
    const rn = btn.getAttribute('data-rn');
    const pw = btn.getAttribute('data-pw');
    document.getElementById('editUserId').value = id;
    document.getElementById('editUsername').value = un;
    document.getElementById('editRealName').value = rn;
    document.getElementById('editPassword').value = pw;
    new bootstrap.Modal(document.getElementById('editModal')).show();
}
</script>
</body>
</html>
