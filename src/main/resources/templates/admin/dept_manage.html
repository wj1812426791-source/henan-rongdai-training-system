<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>部门管理 - 河南融代培训系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/shared.css}">
</head>
<body>

<div class="sidebar" id="sidebar-container"></div>
<input type="hidden" id="userRole" th:value="${session.user?.role} ?: 'admin'">

<div class="main-content">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🏢 部门管理</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">+ 新增部门</button>
    </div>

    <div class="card shadow">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
                <tr>
                    <th>部门编号</th>
                    <th>部门名称</th>
                    <th>部门描述</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="deptTable">
                <tr th:each="d : ${depts}">
                    <td th:text="${d['deptId']}"></td>
                    <td th:text="${d['deptName']}"></td>
                    <td th:text="${d['description']} ?: '-'"></td>
                    <td>
                        <button class="btn btn-warning btn-sm"
                                th:attr="data-id=${d['deptId']}, data-name=${d['deptName']}, data-desc=${d['description']}"
                                onclick="editDept(this)">修改</button>
                        <button class="btn btn-danger btn-sm"
                                th:attr="data-id=${d['deptId']}, data-name=${d['deptName']}"
                                onclick="deleteDept(this)">删除</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(depts)}">
                    <td colspan="4" class="text-center text-muted py-4">暂无部门数据</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</div>

<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <form id="addForm" class="modal-content">
            <div class="modal-header">
                <h5>新增部门</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">部门名称</label>
                    <input type="text" name="deptName" class="form-control" placeholder="如：技术部" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">部门描述</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="可选填部门简介"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-success" onclick="submitAdd()">确认创建</button>
            </div>
        </form>
    </div>
</div>

<div class="modal fade" id="editModal">
    <div class="modal-dialog">
        <form id="editForm" class="modal-content">
            <div class="modal-header">
                <h5>修改部门</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" name="deptId" id="editDeptId">
                <div class="mb-3">
                    <label class="form-label">部门名称</label>
                    <input type="text" name="deptName" id="editDeptName" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">部门描述</label>
                    <textarea name="description" id="editDeptDesc" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-warning" onclick="submitEdit()">保存修改</button>
            </div>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/shared-sidebar.js}"></script>
<script>
function submitAdd() {
    var formData = $('#addForm').serialize();
    $.post('/admin/dept/add', formData, function(res) {
        if (res.success) {
            alert('部门创建成功！');
            location.reload();
        } else {
            alert('创建失败：' + res.message);
        }
    });
}

function editDept(btn) {
    $('#editDeptId').val(btn.getAttribute('data-id'));
    $('#editDeptName').val(btn.getAttribute('data-name'));
    $('#editDeptDesc').val(btn.getAttribute('data-desc') || '');
    new bootstrap.Modal(document.getElementById('editModal')).show();
}

function submitEdit() {
    var formData = $('#editForm').serialize();
    $.post('/admin/dept/update', formData, function(res) {
        if (res.success) {
            alert('部门信息已更新！');
            location.reload();
        } else {
            alert('修改失败：' + res.message);
        }
    });
}

function deleteDept(btn) {
    var id = btn.getAttribute('data-id');
    var name = btn.getAttribute('data-name');
    if (confirm('确定要删除部门「' + name + '」吗？')) {
        $.post('/admin/dept/delete', { deptId: id }, function(res) {
            if (res.success) {
                alert('删除成功！');
                location.reload();
            } else {
                alert('删除失败：' + res.message);
            }
        });
    }
}
</script>
</body>
</html>
