<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">学员管理</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #2c3e50; padding-top: 20px; }
        .sidebar a { display: block; padding: 12px 20px; color: #ecf0f1; text-decoration: none; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; color: #3498db; }
        .sidebar h4 { color: #ecf0f1; text-align: center; margin-bottom: 20px; padding: 0 20px; }
        .main-content { margin-left: 220px; padding: 20px; }
    </style>
</head>
<body>
<div class="sidebar"></div>
<input type="hidden" id="userRole" th:value="${session.user?.role} ?: 'admin'">
<div class="main-content">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="${title}">学员管理</h2>
    </div>

    <div class="card shadow">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>登录账号</th>
                    <th>真实姓名</th>
                    <th>密码</th>
                    <th>当前部门</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${students}">
                    <td th:text="${s.userId}"></td>
                    <td th:text="${s.username}"></td>
                    <td th:text="${s.realName}"></td>
                    <td th:text="${s.password}"></td>
                    <td><span class="badge bg-secondary" th:text="${s.deptName ?: '未分配'}"></span></td>
                    <td>
                        <button class="btn btn-primary btn-sm"
                                th:attr="data-student=${s.userId + ',' + s.username + ',' + s.realName + ',' + s.password + ',' + (s.deptId ?: '')}"
                                onclick="openEditModal(this)">编辑</button>
                        <button class="btn btn-danger btn-sm"
                                th:onclick="'confirmDelete(' + ${s.userId} + ')'">删除</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5>修改学员信息</h5></div>
            <div class="modal-body">
                <input type="hidden" id="editUserId">
                <div class="mb-3">
                    <label>真实姓名</label>
                    <input type="text" id="editRealName" class="form-control">
                </div>
                <div class="mb-3">
                    <label>登录账号</label>
                    <input type="text" id="editUsername" class="form-control">
                </div>
                <div class="mb-3">
                    <label>登录密码</label>
                    <input type="text" id="editPassword" class="form-control">
                </div>
                <div class="mb-3">
                    <label>所属部门</label>
                    <select id="editDeptId" class="form-select">
                        <option value="">-- 请选择部门 --</option>
                        <option th:each="d : ${departments}" th:value="${d.deptId}" th:text="${d.deptName}"></option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="submitUpdate()">保存修改</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/shared-sidebar.js}"></script>
<script>
function openEditModal(btn) {
    const data = btn.getAttribute('data-student').split(',');
    document.getElementById('editUserId').value = data[0];
    document.getElementById('editUsername').value = data[1];
    document.getElementById('editRealName').value = data[2];
    document.getElementById('editPassword').value = data[3];
    document.getElementById('editDeptId').value = data[4] || '';
    new bootstrap.Modal(document.getElementById('editModal')).show();
}

function submitUpdate() {
    const data = {
        userId: document.getElementById('editUserId').value,
        username: document.getElementById('editUsername').value,
        realName: document.getElementById('editRealName').value,
        password: document.getElementById('editPassword').value,
        deptId: document.getElementById('editDeptId').value || null
    };

    fetch('/admin/student/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    }).then(res => res.json()).then(res => {
        if (res.success) {
            alert('修改成功');
            location.reload();
        } else {
            alert('修改失败: ' + (res.msg || '未知错误'));
        }
    });
}

function confirmDelete(userId) {
    if (confirm('确定要删除该学员吗？此操作不可撤销。')) {
        fetch('/admin/student/delete/' + userId, { method: 'POST' })
        .then(res => res.json())
        .then(res => {
            if (res.success) {
                location.reload();
            } else {
                alert('删除失败');
            }
        });
    }
}
</script>
</body>
</html>
